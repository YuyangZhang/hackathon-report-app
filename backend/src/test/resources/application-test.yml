spring:
  datasource:
    url: jdbc:h2:mem:reportdb-test;DB_CLOSE_DELAY=-1;MODE=LEGACY
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: always

security:
  jwt:
    secret: change-me-to-a-longer-jwt-secret-key-1234567890
    expiration: 86400000

logging:
  level:
    root: WARN
