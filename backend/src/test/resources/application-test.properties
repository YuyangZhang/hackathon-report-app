# Test configuration for H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable logging for cleaner test output
logging.level.root=WARN
logging.level.com.legacy.report=INFO
logging.level.org.springframework.security=WARN

# JWT settings for tests (shorter expiration for testing)
security.jwt.secret=test-jwt-secret-key-for-unit-tests-only-do-not-use-in-production
security.jwt.expiration=3600000

# Disable external services
management.endpoints.web.exposure.include=health,info

# Test-specific properties
spring.main.allow-bean-definition-overriding=true
